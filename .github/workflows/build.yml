name: Build Ubuntu GSI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ShellCheck Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          find . -name '*.sh' \
            -not -path './third_party/*' \
            -not -path './builder/out/*' \
            -print0 | xargs -0 shellcheck --severity=warning

  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            squashfs-tools \
            e2fsprogs \
            jq \
            debootstrap \
            qemu-user-static

      - name: Create test rootfs
        run: |
          # CI uses a minimal placeholder rootfs
          mkdir -p builder/out/ubuntu-rootfs/etc
          echo "CI_BUILD=true" > builder/out/ubuntu-rootfs/etc/ci-marker
          mkdir -p builder/out/ubuntu-rootfs/lib/systemd
          touch builder/out/ubuntu-rootfs/lib/systemd/systemd

      - name: Build system.img
        run: |
          chmod +x build.sh builder/scripts/*.sh scripts/*.sh
          # Run build.sh but skip the download phase (rootfs already staged)
          ROOTFS_TARBALL_NAME="SKIP" bash build.sh

      - name: Verify artifacts
        run: |
          echo "=== Build Artifacts ==="
          ls -lh builder/out/system.img || echo "system.img missing"
          ls -lh builder/out/linux_rootfs.squashfs || echo "squashfs missing"
          ls -lh builder/out/userdata.img || echo "userdata.img missing"

      - name: Upload artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-gsi-images
          path: |
            builder/out/system.img
            builder/out/linux_rootfs.squashfs
            builder/out/userdata.img
          retention-days: 30
